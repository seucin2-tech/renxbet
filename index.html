<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RENX.BET - VERSION 2026</title>
    <style>
        :root { --gold: #ffc107; --bg: #1a0000; }
        body { margin: 0; background: #000 radial-gradient(circle, #2b0000 0%, #000 100%); color: white; font-family: sans-serif; }
        
        /* Menu Header */
        header { border-bottom: 2px solid var(--gold); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); sticky: top; z-index: 100; }
        .logo { font-size: 24px; font-weight: bold; color: var(--gold); text-shadow: 0 0 10px var(--gold); text-decoration: none; }
        .menu-top a { color: white; text-decoration: none; margin-left: 15px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .menu-top a:hover { color: var(--gold); }
        
        .container { display: flex; justify-content: center; align-items: center; min-height: 80vh; padding: 20px; }
        .auth-box { background: rgba(10,10,10,0.9); border: 2px solid var(--gold); padding: 30px; border-radius: 15px; width: 350px; text-align: center; box-shadow: 0 0 20px rgba(255,193,7,0.3); }
        
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid #444; }
        .tab { flex: 1; padding: 10px; cursor: pointer; color: #888; font-weight: bold; }
        .tab.active { color: var(--gold); border-bottom: 3px solid var(--gold); }
        
        input { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        .btn-gold { background: linear-gradient(180deg, #ffde59, #ffbd59); color: black; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 16px; }
        
        #game-zone { display: none; width: 100%; max-width: 1000px; margin: 0 auto; }
        .layout { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; }
        @media (max-width: 800px) { .layout { grid-template-columns: 1fr; } }
        
        .box { background: #1a3c26; border: 3px solid var(--gold); border-radius: 20px; padding: 30px; text-align: center; }
        .chat-container { background: #000; border: 2px solid var(--gold); border-radius: 15px; height: 450px; display: flex; flex-direction: column; }
        #chat-content { flex: 1; overflow-y: auto; padding: 15px; font-size: 14px; text-align: left; }
        .chat-input { display: flex; border-top: 1px solid #333; padding: 10px; }
        .chat-input input { margin: 0; flex: 1; border: none; }
        .send-btn { background: var(--gold); border: none; padding: 10px 15px; font-weight: bold; cursor: pointer; }

        /* Popup Nạp Tiền */
        #nap-tien-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 2px solid var(--gold); padding: 20px; border-radius: 10px; z-index: 1000; width: 300px; text-align: center; box-shadow: 0 0 50px #000; }
        .close-btn { color: var(--gold); float: right; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">RENX.BET</a>
    <div class="menu-top">
        <a onclick="document.getElementById('nap-tien-modal').style.display='block'">NẠP TIỀN</a>
        <a href="https://www.facebook.com/profile.php?id=61577073853260" target="_blank">FANPAGE</a>
    </div>
</header>

<div id="user-bar" style="text-align:center; padding: 10px; color:var(--gold); font-weight:bold;"></div>

<div id="nap-tien-modal">
    <span class="close-btn" onclick="document.getElementById('nap-tien-modal').style.display='none'">[ĐÓNG]</span>
    <h3 style="color:var(--gold)">HỆ THỐNG NẠP TIỀN</h3>
    <hr border="1" color="#333">
    <p>Vui lòng chuyển khoản qua:</p>
    <p><b>Ngân hàng:</b> MB BANK</p>
    <p><b>Số TK:</b> 0961817551</p>
    <p><b>Chủ TK:</b> NGUYEN PHUONG NAM</p>
    <p style="font-size:12px; color:#aaa;">Nội dung: [Tên tài khoản game]</p>
</div>

<div class="container">
    <div id="auth-page" class="auth-box">
        <div class="tabs">
            <div id="t-login" class="tab active" onclick="document.getElementById('auth-title').innerText='ĐĂNG NHẬP'; document.getElementById('main-btn').innerText='XÁC NHẬN'; this.classList.add('active'); document.getElementById('t-reg').classList.remove('active');">ĐĂNG NHẬP</div>
            <div id="t-reg" class="tab" onclick="document.getElementById('auth-title').innerText='ĐĂNG KÝ'; document.getElementById('main-btn').innerText='TẠO TÀI KHOẢN'; this.classList.add('active'); document.getElementById('t-login').classList.remove('active');">ĐĂNG KÝ</div>
        </div>
        <h2 id="auth-title" style="color: var(--gold);">ĐĂNG NHẬP</h2>
