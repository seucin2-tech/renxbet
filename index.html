<script>
/* ===============================
   RENX.BET CASINO FULL SCRIPT
=================================*/

let currentUser = "";
let balance = 0;

/* ===============================
   STORAGE
=================================*/
function save(){
    if(currentUser){
        localStorage.setItem("renx_user_"+currentUser, balance);
    }
}

function load(){
    balance = parseInt(localStorage.getItem("renx_user_"+currentUser)) || 0;
    updateUI();
}

function updateUI(){
    document.getElementById("user-bar").innerText =
        "Chào: " + currentUser + " | 💰 " + balance + " VNĐ";
}

/* ===============================
   LOGIN
=================================*/
function login(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(!u || !p){
        alert("Nhập đầy đủ thông tin!");
        return;
    }

    currentUser = u;

    document.getElementById("auth").style.display="none";
    document.getElementById("lobby").style.display="block";

    load();
}

/* ===============================
   NẠP TIỀN
=================================*/
function napTien(){
    let t = parseInt(document.getElementById("nap-tien").value);
    if(!t || t <= 0){
        alert("Nhập số tiền hợp lệ");
        return;
    }

    balance += t;
    save();
    updateUI();
    alert("Nạp thành công!");
}

/* ===============================
   GAME CONTROL
=================================*/
let time = 60;
let interval;
let selectedSide = null;
let playerBet = 0;
let roundOpen = true;
let historyList = [];

function openGame(){
    document.getElementById("lobby").style.display="none";
    document.getElementById("game-zone").style.display="block";
    startRound();
}

function backLobby(){
    document.getElementById("game-zone").style.display="none";
    document.getElementById("lobby").style.display="block";
    clearInterval(interval);
}

function startRound(){
    time = 60;
    roundOpen = true;
    selectedSide = null;
    playerBet = 0;

    document.getElementById("clock").innerText = "01:00";
    document.getElementById("bowl").style.top = "40px";
    document.getElementById("dice-area").innerHTML = "🎲 🎲 🎲";

    clearInterval(interval);
    interval = setInterval(updateClock, 1000);
}

function updateClock(){
    time--;

    let m = Math.floor(time/60);
    let s = time%60;

    document.getElementById("clock").innerText =
        (m<10?"0"+m:m)+":"+(s<10?"0"+s:s);

    if(time <= 0){
        roundOpen = false;
        clearInterval(interval);
        shakeBowl();
    }
}

/* ===============================
   SHAKE ANIMATION
=================================*/
function shakeBowl(){
    let bowl = document.getElementById("bowl");
    let count = 0;

    let shake = setInterval(()=>{
        bowl.style.left = 48 + Math.random()*4 + "%";
        count++;

        if(count > 20){
            clearInterval(shake);
            bowl.style.left = "50%";
            openBowl();
        }
    }, 50);
}

/* ===============================
   OPEN BOWL & RESULT
=================================*/
function openBowl(){
    document.getElementById("bowl").style.top = "-80px";

    let d1 = randomDice();
    let d2 = randomDice();
    let d3 = randomDice();

    let sum = d1 + d2 + d3;
    let result = sum > 10 ? "TÀI" : "XỈU";

    document.getElementById("dice-area").innerHTML =
        diceFace(d1)+" "+diceFace(d2)+" "+diceFace(d3);

    addHistory(result);
    resolve(result);

    setTimeout(startRound, 10000);
}

function randomDice(){
    return Math.floor(Math.random()*6)+1;
}

function diceFace(n){
    return ["⚀","⚁","⚂","⚃","⚄","⚅"][n-1];
}

/* ===============================
   BET SYSTEM
=================================*/
function selectSide(side){
    if(!roundOpen){
        alert("Hết thời gian cược!");
        return;
    }
    selectedSide = side;
    addChat("Bạn", "Chọn " + side);
}

function confirmBet(){
    if(!roundOpen){
        alert("Hết thời gian cược!");
        return;
    }

    let bet = parseInt(document.getElementById("bet").value);

    if(!bet || bet <= 0){
        alert("Nhập tiền cược!");
        return;
    }

    if(bet > balance){
        alert("Không đủ tiền!");
        return;
    }

    if(!selectedSide){
        alert("Chọn TÀI hoặc XỈU!");
        return;
    }

    balance -= bet;
    playerBet = bet;

    save();
    updateUI();

    addChat("Bạn", "Đặt " + bet + " VNĐ vào " + selectedSide);
}

function resolve(result){
    if(playerBet > 0){

        if(selectedSide === result){
            balance += playerBet * 2;
            addChat("Hệ thống", "🎉 Bạn thắng +" + (playerBet*2) + " VNĐ");
        } else {
            addChat("Hệ thống", "❌ Bạn thua!");
        }

        save();
        updateUI();
    }
}

/* ===============================
   HISTORY
=================================*/
function addHistory(result){
    historyList.unshift(result);
    if(historyList.length > 10) historyList.pop();

    let html = "";

    historyList.forEach(r=>{
        html += `
        <div style="
        width:40px;height:40px;border-radius:50%;
        display:flex;align-items:center;justify-content:center;
        background:${r==="TÀI"?"#1e3d8f":"#8f1e1e"};
        font-weight:bold;">
        ${r==="TÀI"?"T":"X"}
        </div>`;
    });

    document.getElementById("history").innerHTML = html;
}

/* ===============================
   CHAT
=================================*/
function addChat(name,msg){
    let c = document.getElementById("chat-content");
    c.innerHTML += "<div><b style='color:#ffc107'>"+name+":</b> "+msg+"</div>";
    c.scrollTop = c.scrollHeight;
}

function gui(){
    let m = document.getElementById("msg").value;
    if(!m) return;
    addChat("Bạn", m);
    document.getElementById("msg").value = "";
}
</script>
