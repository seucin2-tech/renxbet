<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RENX.BET - VERSION 2026</title>
    <style>
        :root { --gold: #ffc107; --bg: #1a0000; }
        body { margin: 0; background: #000 radial-gradient(circle, #2b0000 0%, #000 100%); color: white; font-family: sans-serif; }
        header { border-bottom: 2px solid var(--gold); padding: 15px; text-align: center; background: rgba(0,0,0,0.8); }
        .logo { font-size: 28px; font-weight: bold; color: var(--gold); text-shadow: 0 0 10px var(--gold); text-decoration: none; }
        
        .container { display: flex; justify-content: center; align-items: center; min-height: 80vh; padding: 20px; }
        .auth-box { background: rgba(10,10,10,0.9); border: 2px solid var(--gold); padding: 30px; border-radius: 15px; width: 350px; text-align: center; box-shadow: 0 0 20px rgba(255,193,7,0.3); }
        
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid #444; }
        .tab { flex: 1; padding: 10px; cursor: pointer; color: #888; font-weight: bold; }
        .tab.active { color: var(--gold); border-bottom: 3px solid var(--gold); }
        
        input { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        .btn-gold { background: linear-gradient(180deg, #ffde59, #ffbd59); color: black; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 16px; }
        
        #game-zone { display: none; width: 100%; max-width: 1000px; margin: 0 auto; }
        .layout { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; }
        @media (max-width: 800px) { .layout { grid-template-columns: 1fr; } }
        
        .box { background: #1a3c26; border: 3px solid var(--gold); border-radius: 20px; padding: 30px; text-align: center; }
        .chat-container { background: #000; border: 2px solid var(--gold); border-radius: 15px; height: 450px; display: flex; flex-direction: column; }
        #chat-content { flex: 1; overflow-y: auto; padding: 15px; font-size: 14px; text-align: left; }
        .chat-input { display: flex; border-top: 1px solid #333; padding: 10px; }
        .chat-input input { margin: 0; flex: 1; border: none; }
        .send-btn { background: var(--gold); border: none; padding: 10px 15px; font-weight: bold; cursor: pointer; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">RENX.BET</a>
    <div id="user-bar" style="margin-top:10px; color:var(--gold); font-weight:bold;">Chào: Guest | 💰 0 VNĐ</div>
</header>

<div class="container">
    <div id="auth-page" class="auth-box">
        <div class="tabs">
            <div id="t-login" class="tab active" onclick="document.getElementById('auth-title').innerText='ĐĂNG NHẬP'; document.getElementById('main-btn').innerText='XÁC NHẬN'; this.classList.add('active'); document.getElementById('t-reg').classList.remove('active');">ĐĂNG NHẬP</div>
            <div id="t-reg" class="tab" onclick="document.getElementById('auth-title').innerText='ĐĂNG KÝ'; document.getElementById('main-btn').innerText='TẠO TÀI KHOẢN'; this.classList.add('active'); document.getElementById('t-login').classList.remove('active');">ĐĂNG KÝ</div>
        </div>
        <h2 id="auth-title" style="color: var(--gold);">ĐĂNG NHẬP</h2>
        <input type="text" id="user" placeholder="Tên tài khoản...">
        <input type="password" id="pass" placeholder="Mật khẩu...">
        <button id="main-btn" class="btn-gold" onclick="
            var u = document.getElementById('user').value;
            var p = document.getElementById('pass').value;
            if(!u || !p) { alert('Vui lòng nhập đủ Tài khoản và Mật khẩu!'); }
            else { 
                if(document.getElementById('auth-title').innerText == 'ĐĂNG KÝ') {
                    alert('Đăng ký thành công! Hãy đăng nhập.');
                    document.getElementById('t-login').click();
                } else {
                    document.getElementById('auth-page').style.display='none';
                    document.getElementById('game-zone').style.display='block';
                    document.getElementById('user-bar').innerText = 'Chào: ' + u + ' | 💰 0 VNĐ';
                    setInterval(function(){ 
                        var time = document.getElementById('clock').innerText.split(':');
                        var m = parseInt(time[0]); var s = parseInt(time[1]);
                        if(s==0){if(m==0){m=5;s=0;}else{m--;s=59;}}else{s--;}
                        document.getElementById('clock').innerText = (m < 10 ? '0'+m : m) + ':' + (s < 10 ? '0'+s : s);
                    }, 1000);
                }
            }
        ">XÁC NHẬN</button>
    </div>

    <div id="game-zone">
        <div class="layout">
            <div class="box">
                <h1 id="clock" style="font-size: 50px; color: var(--gold);">05:00</h1>
                <div style="font-size: 80px; margin: 20px;">🎲 🎲 🎲</div>
                
                <!-- Thêm phần chọn mức cọc tiền -->
                <input type="number" id="bet-amount" placeholder="Nhập số tiền cọc (VND)" style="margin: 10px 0;">

                <div style="display: flex; gap: 15px; justify-content: center;">
                    <button class="btn-gold" style="width:120px; background:#2980b9; color:white;" onclick="placeBet('TÀI')">TÀI</button>
                    <button class="btn-gold" style="width:120px; background:#c0392b; color:white;" onclick="placeBet('XỈU')">XỈU</button>
                </div>
                <button onclick="location.reload()" style="margin-top:30px; background:none; color:#666; border:1px solid #444; cursor:pointer; padding:10px;">ĐĂNG XUẤT</button>
            </div>

            <div class="chat-container">
                <div style="background:var(--gold); color:black; padding:10px; font-weight:bold; text-align:center;">KÊNH CHAT TRỰC TUYẾN</div>
                <div id="chat-content">
                    <div><b style="color:var(--gold)">Hệ thống:</b> Chào mừng bạn đến với RENX.BET!</div>
                </div>
                <div class="chat-input">
                    <input type="text" id="m-txt" placeholder="Nhập tin nhắn...">
                    <button class="send-btn" onclick="sendMessage()">GỬI</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let userBalance = 0;

    function placeBet(type) {
        var betAmount = document.getElementById('bet-amount').value;
        if (betAmount <= 0 || isNaN(betAmount)) {
            alert('Vui lòng nhập số tiền hợp lệ!');
            return;
        }
        if (betAmount > userBalance) {
            alert('Số tiền đặt cược không đủ!');
            return;
        }

        userBalance -= betAmount;
        document.getElementById('user-bar').innerText = 'Chào: ' + document.getElementById('user').value + ' | 💰 ' + userBalance + ' VNĐ';

        // Xử lý đặt cược
        var c = document.getElementById('chat-content');
        c.innerHTML += `<div><b style='color:var(--gold)'>Bạn:</b> Đặt cược ${betAmount} VND vào ${type}</div>`;
        c.scrollTop = c.scrollHeight;

        // Tính kết quả
        var dice1 = Math.floor(Math.random() * 6) + 1;
        var dice2 = Math.floor(Math.random() * 6) + 1;
        var dice3 = Math.floor(Math.random() * 6) + 1;
        var sum = dice1 + dice2 + dice3;

        var result = (sum > 10) ? 'TÀI' : 'XỈU';
        var win = (result === type);
        var message = win ? `Bạn thắng! Tiền thưởng: ${betAmount * 2} VND.` : `Bạn thua!`;
        
        userBalance += win ? betAmount * 2 : 0;
        document.getElementById('user-bar').innerText = 'Chào: ' + document.getElementById('user').value + ' | 💰 ' + userBalance + ' VNĐ';

        c.innerHTML += `<div><b style='color:var(--gold)'>Hệ thống:</b> Kết quả: ${dice1} + ${dice2} + ${dice3} = ${sum}. ${message}</div>`;
        c.scrollTop = c.scrollHeight;
    }

    function sendMessage() {
        var message = document.getElementById('m-txt').value;
        if (message) {
            var c = document.getElementById('chat-content');
            c.innerHTML += `<div><b style='color:var(--gold)'>Bạn:</b> ${message}</div>`;
            document.getElementById('m-txt').value = '';
            c.scrollTop = c.scrollHeight;
        }
    }
</script>

</body>
</html>
