<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>3D FPS Web Game - Đồi Núi & Bot</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ui {
            position: absolute; bottom: 20px; left: 20px;
            color: white; text-shadow: 2px 2px 4px black;
            user-select: none;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px;
            border: 2px solid white; border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #health-bar {
            width: 200px; height: 20px; background: rgba(0,0,0,0.5);
            border: 2px solid white; margin-bottom: 5px;
        }
        #health-fill { width: 100%; height: 100%; background: #ff4444; transition: 0.2s; }
        #instructions {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); color: white; padding: 20px; text-align: center;
            cursor: pointer; z-index: 10;
        }
    </style>
</head>
<body>

<div id="instructions">
    <h1>CLICK ĐỂ CHƠI</h1>
    <p>(W,A,S,D = Di chuyển | Chuột = Nhìn/Bắn)</p>
</div>

<div id="ui">
    <div id="health-bar"><div id="health-fill"></div></div>
    <div id="ammo">Đạn: 30 / ∞</div>
</div>
<div id="crosshair"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

    // --- 1. KHỞI TẠO CƠ BẢN ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb); // Bầu trời xanh
    scene.fog = new THREE.Fog(0x87ceeb, 0, 100);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
    scene.add(light);

    // --- 2. TẠO ĐỊA HÌNH ĐỒI NÚI (TERRAIN) ---
    const terrainSize = 200;
    const segments = 60;
    const geometry = new THREE.PlaneGeometry(terrainSize, terrainSize, segments, segments);
    
    // Làm lồi lõm địa hình
    const vertices = geometry.attributes.position.array;
    for (let i = 0; i < vertices.length; i += 3) {
        const x = vertices[i];
        const y = vertices[i + 1];
        // Dùng hàm Math.sin để tạo đồi núi giả lập
        vertices[i + 2] = Math.sin(x * 0.1) * Math.cos(y * 0.1) * 3 + Math.sin(x * 0.05) * 5;
    }
    geometry.computeVertexNormals();

    const material = new THREE.MeshPhongMaterial({ color: 0x3c6114, flatShading: true });
    const terrain = new THREE.Mesh(geometry, material);
    terrain.rotation.x = -Math.PI / 2;
    scene.add(terrain);

    // --- 3. HỆ THỐNG DI CHUYỂN ---
    const controls = new PointerLockControls(camera, document.body);
    const instructions = document.getElementById('instructions');

    instructions.addEventListener('click', () => controls.lock());
    controls.addEventListener('lock', () => instructions.style.display = 'none');
    controls.addEventListener('unlock', () => instructions.style.display = 'block');

    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    const velocity = new THREE.Vector3();
    const direction = new THREE.Vector3();

    document.addEventListener('keydown', (e) => {
        switch(e.code) {
            case 'KeyW': moveForward = true; break;
            case 'KeyS': moveBackward = true; break;
            case 'KeyA': moveLeft = true; break;
            case 'KeyD': moveRight = true; break;
        }
    });

    document.addEventListener('keyup', (e) => {
        switch(e.code) {
            case 'KeyW': moveForward = false; break;
            case 'KeyS': moveBackward = false; break;
            case 'KeyA': moveLeft = false; break;
            case 'KeyD': moveRight = false; break;
        }
    });

    // --- 4. TẠO BOT (MỤC TIÊU) ---
    const bots = [];
    function createBot(x, z) {
        const botGeo = new THREE.BoxGeometry(1, 2, 1);
        const botMat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
        const bot = new THREE.Mesh(botGeo, botMat);
        bot.position.set(x, 5, z);
        bot.userData = { health: 100 };
        scene.add(bot);
        bots.push(bot);
    }
    // Tạo ngẫu nhiên 5 bot
    for(let i=0; i<5; i++) createBot(Math.random()*40-20, Math.random()*40-20);

    // --- 5. LOGIC BẮN SÚNG ---
    let ammo = 30;
    const raycaster = new THREE.Raycaster();

    window.addEventListener('mousedown', () => {
        if (!controls.isLocked || ammo <= 0) return;

        ammo--;
        document.getElementById('ammo').innerText = `Đạn: ${ammo} / ∞`;

        // Kiểm tra va chạm tia bắn
        raycaster.setFromCamera({x: 0, y: 0}, camera);
        const intersects = raycaster.intersectObjects(bots);

        if (intersects.length > 0) {
            const target = intersects[0].object;
            target.userData.health -= 50;
            target.material.color.setHex(0xffffff); // Hiệu ứng chớp trắng khi trúng
            setTimeout(() => target.material.color.setHex(0xff0000), 100);

            if (target.userData.health <= 0) {
                scene.remove(target);
                bots.splice(bots.indexOf(target), 1);
            }
        }
        
        // Nạp đạn tự động nếu hết
        if (ammo === 0) {
            setTimeout(() => { ammo = 30; document.getElementById('ammo').innerText = `Đạn: ${ammo} / ∞`; }, 1500);
        }
    });

    // --- 6. VÒNG LẶP GAME (GAME LOOP) ---
    let prevTime = performance.now();
    function animate() {
        requestAnimationFrame(animate);

        if (controls.isLocked) {
            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            // Xử lý lực ma sát/giảm tốc
            velocity.x -= velocity.x * 10.0 * delta;
            velocity.z -= velocity.z * 10.0 * delta;

            direction.z = Number(moveForward) - Number(moveBackward);
            direction.x = Number(moveRight) - Number(moveLeft);
            direction.normalize();

            if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
            if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

            controls.moveRight(-velocity.x * delta);
            controls.moveForward(-velocity.z * delta);
            
            // Giữ camera ở độ cao ổn định trên đồi núi
            camera.position.y = 2; 

            // Bot xoay tròn cho sinh động
            bots.forEach(bot => bot.rotation.y += 0.02);

            prevTime = time;
        }

        renderer.render(scene, camera);
    }

    // Xử lý khi resize cửa sổ
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
