<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Plane vs Alien</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
}

canvas{
display:block;
background:#111;
}

#controls{
position:fixed;
bottom:20px;
left:20px;
}

button{
font-size:30px;
padding:15px 25px;
margin:5px;
}

</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="controls">
<button id="left">◀</button>
<button id="right">▶</button>
</div>

<script>

let canvas=document.getElementById("game")
let ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let player={
x:120,
y:canvas.height/2,
hp:3
}

let bullets=[]
let aliens=[]
let items=[]
let explosions=[]

let score=0
let gameOver=false

function spawnAlien(){

if(gameOver)return

aliens.push({
x:canvas.width,
y:Math.random()*canvas.height,
speed:3
})

}

setInterval(spawnAlien,2000)


// TOUCH MOVE (lên xuống)
canvas.addEventListener("touchmove",(e)=>{

let touch=e.touches[0]
player.y=touch.clientY

})

// TOUCH SHOOT
canvas.addEventListener("touchstart",()=>{

if(gameOver)return

bullets.push({
x:player.x+40,
y:player.y+20,
speed:10
})

})


// BUTTON MOVE
document.getElementById("left").onclick=()=>{
player.x-=30
}

document.getElementById("right").onclick=()=>{
player.x+=30
}


// UPDATE
function update(){

bullets.forEach(b=>{
b.x+=b.speed
})

aliens.forEach(a=>{
a.x-=a.speed
})

items.forEach(i=>{
i.x-=2
})

bullets=bullets.filter(b=>b.x<canvas.width)

}


// COLLISION
function collision(){

bullets.forEach((b,bi)=>{

aliens.forEach((a,ai)=>{

if(
b.x<a.x+40 &&
b.x+10>a.x &&
b.y<a.y+40 &&
b.y+10>a.y
){

aliens.splice(ai,1)
bullets.splice(bi,1)

score+=10

explosions.push({
x:a.x,
y:a.y,
time:30
})

if(Math.random()<0.4){

items.push({
x:a.x,
y:a.y
})

}

}

})

})


aliens.forEach((a,ai)=>{

if(
player.x<a.x+40 &&
player.x+40>a.x &&
player.y<a.y+40 &&
player.y+40>a.y
){

aliens.splice(ai,1)

player.hp--

explosions.push({
x:player.x,
y:player.y,
time:40
})

if(player.hp<=0){
gameOver=true
}

}

})


items.forEach((i,ii)=>{

if(
player.x<i.x+20 &&
player.x+40>i.x &&
player.y<i.y+20 &&
player.y+40>i.y
){

player.hp++
items.splice(ii,1)

}

})

}


// DRAW
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

// plane
ctx.fillStyle="blue"

ctx.beginPath()
ctx.moveTo(player.x+40,player.y+20)
ctx.lineTo(player.x,player.y)
ctx.lineTo(player.x,player.y+40)
ctx.closePath()
ctx.fill()


// bullets
ctx.fillStyle="yellow"

bullets.forEach(b=>{
ctx.fillRect(b.x,b.y,10,4)
})


// aliens
aliens.forEach(a=>{

ctx.fillStyle="green"

ctx.beginPath()
ctx.ellipse(a.x+20,a.y+20,25,10,0,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="lime"

ctx.beginPath()
ctx.arc(a.x+20,a.y+15,8,0,Math.PI*2)
ctx.fill()

})


// items
ctx.fillStyle="orange"

items.forEach(i=>{
ctx.fillRect(i.x,i.y,15,15)
})


// explosions
explosions.forEach((e,ei)=>{

ctx.fillStyle="red"

ctx.beginPath()
ctx.arc(e.x,e.y,40-e.time,0,Math.PI*2)
ctx.fill()

e.time--

if(e.time<=0){
explosions.splice(ei,1)
}

})


// UI
ctx.fillStyle="white"
ctx.font="20px Arial"

ctx.fillText("Score: "+score,20,30)
ctx.fillText("HP: "+player.hp,20,60)


if(gameOver){

ctx.fillStyle="red"
ctx.font="50px Arial"
ctx.fillText("BẠN THUA RỒI",canvas.width/2-180,canvas.height/2)

ctx.fillStyle="white"
ctx.font="30px Arial"
ctx.fillText("Đưa tôi 10 nghìn để chơi tiếp",canvas.width/2-220,canvas.height/2+50)

}

}


// GAME LOOP
function gameLoop(){

if(!gameOver){
update()
collision()
}

draw()

requestAnimationFrame(gameLoop)

}

gameLoop()

</script>

</body>
</html>
