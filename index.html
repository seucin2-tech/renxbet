<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RENX.BET - CỔNG GAME UY TÍN 2026</title>
    <style>
        :root { --gold: #ffc107; --neon: 0 0 15px rgba(255, 193, 7, 0.6); }
        body { margin: 0; background: #000 radial-gradient(circle, #2b0000 0%, #000 100%); color: white; font-family: 'Segoe UI', Arial, sans-serif; overflow-x: hidden; }
        
        /* Menu Header */
        header { 
            background: rgba(0, 0, 0, 0.95); border-bottom: 2px solid var(--gold); 
            padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 24px; font-weight: bold; color: var(--gold); text-shadow: var(--neon); text-decoration: none; }
        .nav-links a { color: white; text-decoration: none; margin-left: 15px; font-size: 13px; font-weight: bold; text-transform: uppercase; }
        .nav-links a:hover { color: var(--gold); }

        .container { display: flex; justify-content: center; align-items: center; min-height: 85vh; padding: 20px; box-sizing: border-box; }
        
        /* Auth Box */
        .auth-box { background: rgba(15,15,15,0.98); border: 2px solid var(--gold); padding: 30px; border-radius: 15px; width: 100%; max-width: 360px; box-shadow: var(--neon); text-align: center; }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid #333; }
        .tab { flex: 1; padding: 12px; cursor: pointer; color: #777; font-weight: bold; }
        .tab.active { color: var(--gold); border-bottom: 3px solid var(--gold); }
        
        input { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--gold); }
        .btn-gold { background: linear-gradient(180deg, #ffde59, #ffbd59); color: black; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 16px; margin-top: 10px; }

        /* Game & Chat Layout */
        #game-page { display: none; width: 100%; max-width: 1100px; margin: 0 auto; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .layout { display: grid; grid-template-columns: 1.6fr 1fr; gap: 20px; }
        @media (max-width: 850px) { .layout { grid-template-columns: 1fr; } }
        
        .game-card { background: #1a3c26; border: 3px solid var(--gold); border-radius: 20px; padding: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .chat-card { background: #000; border: 2px solid var(--gold); border-radius: 20px; height: 500px; display: flex; flex-direction: column; overflow: hidden; }
        
        #chat-msgs { flex: 1; overflow-y: auto; padding: 15px; font-size: 14px; text-align: left; background: #050505; }
        .chat-input-row { display: flex; padding: 10px; background: #111; border-top: 1px solid #333; gap: 8px; }
        .chat-input-row input { margin: 0; font-size: 14px; }
        .btn-send { background: var(--gold); border: none; padding: 0 15px; font-weight: bold; cursor: pointer; border-radius: 5px; }

        .timer { font-size: 60px; color: var(--gold); font-weight: bold; text-shadow: var(--neon); margin: 10px 0; }
        .user-info-bar { background: rgba(255,193,7,0.1); padding: 10px; border-radius: 10px; margin-bottom: 20px; border: 1px dashed var(--gold); color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">RENX.BET</a>
    <div class="nav-links" id="menu-links">
        <a href="#" onclick="alert('Liên hệ CSKH để nạp tiền!')">Nạp Tiền</a>
        <a href="#" onclick="alert('Sự kiện đua Top sắp diễn ra!')">Sự Kiện</a>
        <a href="https://www.facebook.com/profile.php?id=61577073853260" target="_blank">Fanpage</a>
    </div>
</header>

<div class="container">
    <div id="auth-page" class="auth-box">
        <div class="tabs">
            <div id="t-login" class="tab active" onclick="setAuthMode('login')">ĐĂNG NHẬP</div>
            <div id="t-reg" class="tab" onclick="setAuthMode('reg')">ĐĂNG KÝ</div>
        </div>
        <h2 id="auth-title" style="color: var(--gold); margin-top: 0;">ĐĂNG NHẬP</h2>
        <input type="text" id="username" placeholder="Tên tài khoản...">
        <input type="password" id="password" placeholder="Mật khẩu...">
        <button class="btn-gold" id="btn-submit" onclick="handleAuth()">XÁC NHẬN</button>
    </div>

    <div id="game-page">

                <div class="timer" id="clock">05:00</div>
                <div style="font-size: 70px; margin: 20px;">🎲 🎲 🎲</div>
                <div style="display: flex; gap: 15px; justify-content: center;">

                    <button class="btn-gold" style="width:130px; background:#c0392b; color:white;" onclick="sysMsg('Bạn đã đặt cửa XỈU')">CƯỢC XỈU</button>
                </div>
                <button onclick="location.reload()" style="margin-top:40px; background:none; color:#777; border:1px solid #333; cursor:pointer; padding:8px 20px; border-radius:5px;">Đăng xuất</button>
            </div>

            <div class="chat-card">
                <div style="background:var(--gold); color:black; padding:12px; font-weight:bold; text-align:center; font-size:14px;">KÊNH CHAT TRỰC TUYẾN</div>
                <div id="chat-msgs">
                    <div><b style="color:var(--gold)">Hệ thống:</b> Chào mừng bạn đến với sảnh game RENX.BET!</div>
                </div>
                <div class="chat-input-row">
                    <input type="text" id="chat-inp" placeholder="Nhập tin nhắn..." onkeypress="if(event.keyCode==13) sendChat()">
                    <button class="btn-send" onclick="sendChat()">GỬI</button>
                </div>
            </div>
        </div>
    </div>
</div>
