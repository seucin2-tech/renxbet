<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Nông Trại</title>

<style>

body{
margin:0;
background:#87ceeb;
overflow:hidden;
font-family:Arial;
}

canvas{
display:block;
background:#6dbf4b;
}

#ui{
position:fixed;
top:10px;
left:10px;
background:white;
padding:10px;
border-radius:10px;
}

</style>

</head>

<body>

<div id="ui">
Tiền: <span id="money">20</span> 💰<br>
Hạt giống: <span id="seeds">0</span> 🌱
</div>

<canvas id="game"></canvas>

<script>

// canvas
let canvas=document.getElementById("game")
let ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

// image
let farmerImg=new Image()
farmerImg.src="farmer.png"

// player
let player={
x:200,
y:300,
speed:4
}

// sprite
let frame=0
let frameTimer=0

// money
let money=20
let seeds=0

// shop
let shop={
x:100,
y:120,
size:80
}

// plots
let plots=[

{x:500,y:400,state:0,grow:0},
{x:650,y:400,state:0,grow:0}

]

// states
//0 empty
//1 planted
//2 watered
//3 ready

// keyboard
let keys={}

document.addEventListener("keydown",(e)=>{
keys[e.key]=true
})

document.addEventListener("keyup",(e)=>{
keys[e.key]=false
})

// click
canvas.addEventListener("click",()=>{

// buy seeds
if(distance(player,shop)<100){

if(money>=10){
money-=10
seeds++
updateUI()
return
}

}

// farm
plots.forEach(p=>{

if(distance(player,p)<90){

if(p.state==0 && seeds>0){

p.state=1
seeds--

}

else if(p.state==3){

money+=20
p.state=0
p.grow=0

}

}

})

updateUI()

})

// water
document.addEventListener("keydown",(e)=>{

if(e.key=="e"){

plots.forEach(p=>{

if(distance(player,p)<90 && p.state==1){

p.state=2

}

})

}

})

// distance
function distance(a,b){

let dx=a.x-b.x
let dy=a.y-b.y

return Math.sqrt(dx*dx+dy*dy)

}

// update
function update(){

// movement
if(keys["w"]) player.y-=player.speed
if(keys["s"]) player.y+=player.speed
if(keys["a"]) player.x-=player.speed
if(keys["d"]) player.x+=player.speed

// animation
frameTimer++

if(frameTimer>10){
frame++
frameTimer=0
}

if(frame>8) frame=0

// plant growth
plots.forEach(p=>{

if(p.state==2){

p.grow++

if(p.grow>300){

p.state=3

}

}

})

}

// draw
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

// shop
ctx.fillStyle="orange"
ctx.fillRect(shop.x,shop.y,80,80)

ctx.fillStyle="black"
ctx.fillText("SHOP",shop.x+10,shop.y+45)

// plots
plots.forEach(p=>{

ctx.fillStyle="#8B4513"
ctx.fillRect(p.x,p.y,80,80)

// small plant
if(p.state==1){

ctx.fillStyle="green"
ctx.beginPath()
ctx.arc(p.x+40,p.y+40,10,0,Math.PI*2)
ctx.fill()

}

// watered
if(p.state==2){

ctx.fillStyle="lime"
ctx.beginPath()
ctx.arc(p.x+40,p.y+40,15,0,Math.PI*2)
ctx.fill()

}

// big plant
if(p.state==3){

ctx.fillStyle="darkgreen"
ctx.beginPath()
ctx.arc(p.x+40,p.y+30,20,0,Math.PI*2)
ctx.fill()

ctx.fillRect(p.x+35,p.y+30,10,30)

}

})

// farmer sprite
ctx.drawImage(

farmerImg,
frame*64,0,
64,64,
player.x,
player.y,
64,64

)

}

// ui
function updateUI(){

document.getElementById("money").innerText=money
document.getElementById("seeds").innerText=seeds

}

// game loop
function gameLoop(){

update()
draw()

requestAnimationFrame(gameLoop)

}

gameLoop()

</script>

</body>
</html>
